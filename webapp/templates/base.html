<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}capinator{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">capinator</a>
    <nav>
      {% if user %}
        <a href="/lists">My Lists</a>
        {% if is_admin(user) %}<a href="/admin">Admin</a>{% endif %}
        <span class="who">{{ user.email }}</span>
        <form method="post" action="/logout" class="inline"><button type="submit">Log out</button></form>
      {% else %}
        <a href="/login">Log in</a>
        <a href="/register">Register</a>
      {% endif %}
      <span id="quota-badge" class="quota-badge"
            hx-get="/quota" hx-trigger="load, every 10s" hx-swap="innerHTML">…</span>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
