# capinator stack: Postgres + app (web) + worker (DigiKey), built from one image.
#
# TLS/routing is NOT here — a shared Caddy "edge" stack fronts every site on the host and
# reaches this app over the external `edge` network (see the krazucky-edge repo). Create
# that network once with `docker network create edge`.
#
# Configure via a .env file next to this one (see .env.example). Bring up with:
#   docker compose up -d --build
name: capinator

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capinator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-capinator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capinator} -d ${POSTGRES_DB:-capinator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: capinator:local          # built once, reused by the worker service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # .env supplies SECRET_KEY, DIGIKEY_*, POSTGRES_*, SEED_*. DATABASE_URL is derived
    # here (points at the db service) and COOKIE_SECURE is forced on behind Caddy's TLS.
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-capinator}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-capinator}
      # Fail fast rather than silently falling back to the insecure dev default.
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env (openssl rand -hex 32)}
      COOKIE_SECURE: "true"
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-1}"
    expose:
      - "8000"
    networks:
      default: {}          # reach db/worker on this project's private network
      edge:                # and be reachable by the shared Caddy edge
        aliases:
          - capinator-app  # explicit: both projects have a service named "app"
    # The app owns migrations (entrypoint runs `alembic upgrade head`). The DigiKey worker
    # is a separate service, so the web tier MAY scale — raise WEB_CONCURRENCY or add replicas.

  worker:
    image: capinator:local          # reuse the app image; overrides the entrypoint below
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-capinator}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-capinator}
    # The sole DigiKey-serializing process. It does NOT run migrations (the app does) and
    # retries until the schema exists. NEVER scale this service beyond one instance.
    entrypoint: ["python", "-m", "webapp.worker"]

volumes:
  pgdata:

networks:
  # Shared with the edge (Caddy) stack and any other site on this host.
  # Created out-of-band once: `docker network create edge`.
  edge:
    external: true
    name: edge
